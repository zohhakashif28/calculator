<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>CALCULATOR</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: 'Segoe UI', Tahoma, sans-serif;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: #f0f4f8;
                padding: 20px;
            }
            .calc {
                background: #ffffff;
                border-radius: 30px;
                padding: 35px 30px 40px;
                max-width: 450px;
                width: 100%;
                box-shadow: 0 15px 50px rgba(0, 0, 0, 0.10);
            }
            .calc h1 {
                text-align: center;
                font-size: 26px;
                color: #1a2634;
                margin-bottom: 6px;
            }
            .calc .sub {
                text-align: center;
                color: #6b7a8f;
                font-size: 14px;
                margin-bottom: 28px;
                padding-bottom: 14px;
                border-bottom: 2px dashed #e2e8f0;
            }
            .field {
                margin-bottom: 16px;
            }
            .field label {
                display: block;
                font-weight: 600;
                color: #2d3748;
                font-size: 15px;
                margin-bottom: 4px;
            }
            .field input {
                width: 100%;
                padding: 14px 16px;
                font-size: 20px;
                border: 2px solid #e2e8f0;
                border-radius: 14px;
                background: #f9fafc;
                outline: none;
                transition: 0.2s;
            }
            .field input:focus {
                border-color: #4f8cf7;
                background: #ffffff;
                box-shadow: 0 0 0 4px rgba(79, 140, 247, 0.12);
            }
            .btns {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
                margin: 24px 0 26px;
            }
            .btns button {
                padding: 16px 0;
                font-size: 28px;
                font-weight: 700;
                border: none;
                border-radius: 16px;
                background: #edf2f7;
                color: #1a2634;
                cursor: pointer;
                transition: 0.15s;
            }
            .btns button:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
            }
            .btns button:active {
                transform: scale(0.95);
            }
            .btn-add {
                background: #dbeafe !important;
                color: #1d4ed8 !important;
            }
            .btn-sub {
                background: #fce7f3 !important;
                color: #be185d !important;
            }
            .btn-mul {
                background: #d1fae5 !important;
                color: #047857 !important;
            }
            .btn-div {
                background: #fef3c7 !important;
                color: #b45309 !important;
            }
            .output label {
                font-weight: 600;
                color: #2d3748;
                font-size: 15px;
                display: block;
                margin-bottom: 4px;
            }
            #resultBox {
                width: 100%;
                padding: 16px 20px;
                font-size: 22px;
                font-weight: 600;
                border: 2px solid #e2e8f0;
                border-radius: 14px;
                background: #f9fafc;
                color: #1a2634;
                min-height: 68px;
                display: flex;
                align-items: center;
                transition: 0.2s;
            }
            #resultBox.good {
                background: #ecfdf5;
                border-color: #34d399;
                color: #065f46;
            }
            #resultBox.bad {
                background: #fef2f2;
                border-color: #f87171;
                color: #991b1b;
            }
            .clear {
                margin-top: 18px;
                width: 100%;
                padding: 13px;
                font-size: 16px;
                font-weight: 600;
                border: none;
                border-radius: 14px;
                background: #e2e8f0;
                color: #475569;
                cursor: pointer;
                transition: 0.15s;
            }
            .clear:hover {
                background: #cbd5e1;
                color: #1e293b;
            }
            @media (max-width: 450px) {
                .calc {
                    padding: 24px 16px 28px;
                }
                .btns {
                    gap: 8px;
                }
                .btns button {
                    font-size: 22px;
                    padding: 14px 0;
                }
                #resultBox {
                    font-size: 18px;
                    min-height: 60px;
                    padding: 12px 16px;
                }
            }
        </style>
    </head>
<body>
    <div class="calc">
        <h1>CALCULATOR</h1> 
        <div class="field">
            <label>NUMBER 01</label>
            <input type="number" id="num1" placeholder="e.g. 12" step="any" />
        </div>
        <div class="field">
            <label>NUMBER 02</label>
            <input type="number" id="num2" placeholder="e.g. 8" step="any" />
        </div>
         <div class="btns">
            <button class="btn-add" onclick="doCalc('add')">+</button>
            <button class="btn-sub" onclick="doCalc('sub')">−</button>
            <button class="btn-mul" onclick="doCalc('mul')">×</button>
            <button class="btn-div" onclick="doCalc('div')">÷</button>
        </div>
        <div class="output">
            <label>Result</label>
            <div id="result">—</div>
        </div>
        <button class="clear" onclick="clearAll()">Clear</button>       
    </div>
    <script>
        const n1 = document.getElementById('num1');
        const n2 = document.getElementById('num2');
        const out = document.getElementById('result');
        function doCalc(op) {
            const a = parseFloat(n1.value);
            const b = parseFloat(n2.value);
            if (isNaN(a) || isNaN(b)) {
                out.textContent = 'PLEASE ENTER NUMBERS IN BOTH FIELDS!';
                out.className = 'bad';
                return;
            }
            let result;
            let symbol;
            if (op === 'add') {
                result = a + b;
                symbol = '+';
            } else if (op === 'sub') {
                result = a - b;
                symbol = '−';
            } else if (op === 'mul') {
                result = a * b;
                symbol = '×';
            } else if (op === 'div') {
                if (b === 0) {
                    out.textContent = 'CANNOT DIVIDE BY 0!';
                    out.className = 'bad';
                    return;
                }
                result = a / b;
                symbol = '÷';
            } else {
                out.textContent = 'INVALID OPERATION';
                out.className = 'bad';
                return;
            }
            if (Number.isFinite(result) && !Number.isInteger(result)) {
                result = parseFloat(result.toFixed(6));
            }
            out.textContent = a + ' ' + symbol + ' ' + b + ' = ' + result;
            out.className = 'good';
        }
        function clearAll() {
            n1.value = '';
            n2.value = '';
            out.textContent = '—';
            out.className = '';
            n1.focus();
        }
        n1.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                n2.focus();
            }
        });
        n2.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                doCalc('add');
            }
        });
        n1.focus();       
    </script>
</body>
</html>
